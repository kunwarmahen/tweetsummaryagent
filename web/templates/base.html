<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Twitter Summary Agent{% endblock %}</title>
<style>
  :root { --blue:#1d9bf0; --ink:#0f1419; --muted:#536471; --line:#eff3f4; --bg:#f7f9f9; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:#fff; }
  .layout { display:flex; min-height:100vh; }
  nav { width:220px; background:var(--ink); color:#fff; padding:24px 0; flex-shrink:0; }
  nav h1 { font-size:16px; margin:0 24px 24px; color:#fff; }
  nav a { display:block; color:#cfd9de; text-decoration:none; padding:11px 24px; font-size:14px; }
  nav a:hover { background:#1a2733; color:#fff; }
  nav a.active { background:var(--blue); color:#fff; font-weight:600; }
  main { flex:1; padding:32px 40px; max-width:900px; }
  h2 { margin:0 0 4px; font-size:24px; }
  .sub { color:var(--muted); margin:0 0 24px; font-size:14px; }
  .card { border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin-bottom:18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
  .stat { background:var(--bg); border-radius:10px; padding:16px; }
  .stat .n { font-size:26px; font-weight:700; }
  .stat .l { color:var(--muted); font-size:13px; }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 4px; }
  input[type=text], input[type=number], select, textarea {
    width:100%; padding:9px 11px; border:1px solid #cfd9de; border-radius:8px; font-size:14px; }
  textarea { min-height:64px; resize:vertical; }
  .row { display:flex; gap:18px; } .row > div { flex:1; }
  .check { display:flex; align-items:center; gap:8px; margin-top:14px; }
  .check input { width:auto; }
  button, .btn { background:var(--blue); color:#fff; border:0; border-radius:9999px; padding:10px 20px;
    font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; }
  button:hover, .btn:hover { background:#1a8cd8; }
  .btn-sm { padding:5px 12px; font-size:12px; }
  .btn-ghost { background:#fff; color:var(--blue); border:1px solid var(--blue); }
  .btn-danger { background:#f4212e; } .btn-danger:hover { background:#dc1c28; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
  .pill { padding:2px 10px; border-radius:9999px; font-size:12px; font-weight:600; }
  .pill.success { background:#e1f7e7; color:#127c34; }
  .pill.failed { background:#fde8e8; color:#c81e1e; }
  .pill.running { background:#e8f5fe; color:#1a6dab; }
  .pill.pending { background:#eef1f3; color:#536471; }
  .pill.draft { background:#fef3e0; color:#b45309; }
  .muted { color:var(--muted); }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }
  form.inline { display:inline; }
  /* Bounds Chart.js height — without a sized, positioned parent a responsive canvas
     grows taller on every resize tick. */
  .chart-box { position:relative; height:220px; width:100%; }
  .chart-box canvas { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="layout">
  <nav>
    <h1>🐦 Summary Agent</h1>
    <a href="/" class="{% if active=='home' %}active{% endif %}">Dashboard</a>
    <a href="/trends" class="{% if active=='trends' %}active{% endif %}">Trends</a>
    <a href="/accounts" class="{% if active=='accounts' %}active{% endif %}">Accounts</a>
    <a href="/settings" class="{% if active=='settings' %}active{% endif %}">Settings</a>
    <a href="/runs" class="{% if active=='runs' %}active{% endif %}">Runs</a>
    <a href="/activity" class="{% if active=='activity' %}active{% endif %}">Activity</a>
    <a href="/session" class="{% if active=='session' %}active{% endif %}">Session</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
