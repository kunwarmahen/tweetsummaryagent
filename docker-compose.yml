# Works with `podman-compose up` or `docker compose up`.
# Uses host networking so the container can reach Ollama on the host at localhost:11434
# and the UI is available at http://localhost:8765 (set APP_PORT to change it).
services:
  agent:
    build: .
    image: twitter-summary-agent
    container_name: twitter-summary-agent
    network_mode: host
    env_file: .env                   # APP_HOST/APP_PORT come from here (or the image default 8765)
    environment:
      - OLLAMA_URL=http://localhost:11434
    volumes:
      # Container-owned data (DB, run snapshots, digests), kept separate from the project's
      # ./data. Defaults to ~/.local/share/twitter-summary-agent (matching run-podman.sh);
      # override by exporting TSA_DATA_DIR.
      - ${TSA_DATA_DIR:-${HOME}/.local/share/twitter-summary-agent}:/app/data:Z
      # Auth (X session) read-write so the Session page / import-cookies can write it in-container.
      - ${TSA_AUTH_DIR:-./auth}:/app/auth:Z
    restart: unless-stopped
